spark.sql.extensions                                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg REST catalog via Polaris
spark.sql.catalog.atmosphere                                   org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.atmosphere.type                              rest
spark.sql.catalog.atmosphere.uri                               http://polaris:8181/api/catalog
# credential is passed via --conf from the spark service (env-sourced)
spark.sql.catalog.atmosphere.warehouse                         atmosphere
spark.sql.catalog.atmosphere.scope                             PRINCIPAL_ROLE:ALL
spark.sql.catalog.atmosphere.token-refresh-enabled             false
# Vended credentials disabled: Polaris would try to subscope through AWS STS,
# which isn't reachable from the compose network and doesn't speak SeaweedFS
# creds. Spark uses the static AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env
# vars (sourced from SEAWEEDFS_ADMIN_*) to talk to the S3 endpoint directly.
# Mirrors the ClickHouse `vended_credentials = false` setting in init.

# S3/SeaweedFS storage (catalog-level)
spark.sql.catalog.atmosphere.s3.endpoint                       http://seaweedfs:8333
spark.sql.catalog.atmosphere.s3.path-style-access              true
spark.sql.catalog.atmosphere.client.region                     us-east-1

# Default catalog
spark.sql.defaultCatalog                                       atmosphere

# Checkpointing
spark.sql.streaming.checkpointLocation                         /opt/spark/checkpoints

# Memory tuning for unified streaming (single JVM, 14 GB container limit)
spark.driver.memory                                            10g
spark.driver.memoryOverhead                                    2g
spark.executor.memory                                          10g
spark.executor.memoryOverhead                                  2g
spark.python.worker.memory                                     2g

# Shuffle and resource tuning
# 16 partitions — host has 20 cores; gives each query headroom to parallelize
# without starving the others under FAIR scheduling.
spark.sql.shuffle.partitions                                   16

# FAIR scheduling — lets the 5 concurrent streaming queries share executor
# slots via round-robin instead of FIFO head-of-line blocking. Fixes the
# observed lag asymmetry where sentiment (heavy GPU mapInPandas) was starving
# core_posts, leaving it ~8 min behind while core_engagement stayed ~1.5 min.
spark.scheduler.mode                                           FAIR

# Limit Spark UI retained data (memory savings)
spark.sql.streaming.numRecentProgressUpdates                    10
spark.ui.retainedJobs                                          50
spark.ui.retainedStages                                        50

# Expose Structured Streaming metrics through the Dropwizard MetricsServlet
# (/metrics/json on the driver UI). Heimdall's spark_progress.py reads these
# gauges under the spark.streaming.<query> namespace instead of the DStreams-
# only /streaming/statistics REST endpoints removed/unusable in Spark 4.
spark.sql.streaming.metricsEnabled                             true
