services:
  # --- Infrastructure Services ---

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD}
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atmosphere-data
    mem_limit: 3g
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 15
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    container_name: polaris-bootstrap
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        java -jar /deployments/polaris-admin-tool.jar bootstrap
        --realm=POLARIS --credential=POLARIS,root,s3cr3t
        || echo "Bootstrap already completed (idempotent skip)"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atmosphere-data
    restart: "no"

  polaris:
    image: apache/polaris:latest
    container_name: polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      POLARIS_BOOTSTRAP_CREDENTIALS: ${POLARIS_BOOTSTRAP_CREDENTIALS}
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  # --- Init Container ---

  init:
    build:
      context: ./infra/init
    container_name: init
    environment:
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD}
      POLARIS_HOST: http://polaris:8181
      POLARIS_CLIENT_ID: root
      POLARIS_CLIENT_SECRET: s3cr3t
    depends_on:
      rustfs:
        condition: service_healthy
      polaris:
        condition: service_healthy
    networks:
      - atmosphere-data
    mem_limit: 512m
    restart: "no"

  # --- Spark Unified Streaming Pipeline ---

  spark-unified:
    build:
      context: ./spark
      dockerfile: Dockerfile.sentiment
    container_name: spark-unified
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - local[*]
      - /opt/spark/work-dir/spark/unified.py
    ports:
      - "4040:4040"
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      JETSTREAM_CURSOR: ${JETSTREAM_CURSOR:-}
    volumes:
      - spark-checkpoints:/opt/spark/checkpoints
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
    mem_limit: 14g
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped

volumes:
  rustfs-data:
  postgres-data:
  spark-checkpoints:

networks:
  atmosphere-data:
    name: atmosphere-data
  atmosphere-frontend:
    name: atmosphere-frontend
