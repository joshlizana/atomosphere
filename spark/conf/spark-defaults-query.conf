spark.sql.extensions                                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg REST catalog via Polaris
spark.sql.catalog.atmosphere                                   org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.atmosphere.type                              rest
spark.sql.catalog.atmosphere.uri                               http://polaris:8181/api/catalog
spark.sql.catalog.atmosphere.credential                        root:s3cr3t
spark.sql.catalog.atmosphere.warehouse                         atmosphere
spark.sql.catalog.atmosphere.scope                             PRINCIPAL_ROLE:ALL
spark.sql.catalog.atmosphere.token-refresh-enabled             false
spark.sql.catalog.atmosphere.header.X-Iceberg-Access-Delegation vended-credentials

# Iceberg CachingCatalog TTL. Default is -1 (never expire) in Iceberg 1.10,
# which pins a read-only SparkSession to its first-read snapshot and causes
# dashboards to freeze. Set to 5s to align with the pipeline micro-batch
# cadence (FR-10). refreshTable() is also called at each monitor cycle start
# as an explicit backstop.
spark.sql.catalog.atmosphere.cache.expiration-interval-ms      5000

# S3/RustFS storage (catalog-level)
spark.sql.catalog.atmosphere.s3.endpoint                       http://rustfs:9000
spark.sql.catalog.atmosphere.s3.path-style-access              true
spark.sql.catalog.atmosphere.client.region                     us-east-1

# Default catalog
spark.sql.defaultCatalog                                       atmosphere

# Memory tuning for query API (2 GB container limit, no streaming)
spark.driver.memory                                            1g
spark.driver.memoryOverhead                                    512m
spark.executor.memory                                          1g
spark.executor.memoryOverhead                                  512m

# Shuffle tuning
spark.sql.shuffle.partitions                                   8

# FAIR scheduling — concurrent dashboard panel requests submit Spark jobs from
# different threads. FAIR lets them interleave across executor slots instead of
# head-of-line blocking under FIFO.
spark.scheduler.mode                                           FAIR

# Disable streaming-related features
spark.ui.enabled                                               false
