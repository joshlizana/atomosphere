services:
  # --- Infrastructure Services ---

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD}
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atmosphere-data
    mem_limit: 3g
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 15
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    container_name: polaris-bootstrap
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        java -jar /deployments/polaris-admin-tool.jar bootstrap
        --realm=POLARIS --credential=POLARIS,root,s3cr3t
        || echo "Bootstrap already completed (idempotent skip)"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atmosphere-data
    restart: "no"

  polaris:
    image: apache/polaris:latest
    container_name: polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      POLARIS_BOOTSTRAP_CREDENTIALS: ${POLARIS_BOOTSTRAP_CREDENTIALS}
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  # --- Init Container ---

  init:
    build:
      context: ./infra/init
    container_name: init
    environment:
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD}
      POLARIS_HOST: http://polaris:8181
      POLARIS_CLIENT_ID: root
      POLARIS_CLIENT_SECRET: s3cr3t
    depends_on:
      rustfs:
        condition: service_healthy
      polaris:
        condition: service_healthy
    networks:
      - atmosphere-data
    mem_limit: 512m
    restart: "no"

  # --- Spark Unified Streaming Pipeline ---

  spark-unified:
    build:
      context: ./spark
      dockerfile: Dockerfile.sentiment
    container_name: spark-unified
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - local[*]
      - /opt/spark/work-dir/spark/unified.py
    ports:
      - "4040:4040"
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      JETSTREAM_CURSOR: ${JETSTREAM_CURSOR:-}
    volumes:
      - spark-checkpoints:/opt/spark/checkpoints
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
    mem_limit: 14g
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped

  # --- Query API (Grafana data source) ---

  query-api:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: query-api
    command:
      - python3
      - /opt/spark/work-dir/spark/serving/query_api.py
    ports:
      - "8000:8000"
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      SPARK_CONF_DIR: /opt/spark/conf-query
    volumes:
      - ./spark/conf/spark-defaults-query.conf:/opt/spark/conf-query/spark-defaults.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
      - atmosphere-frontend
    mem_limit: 2g
    restart: unless-stopped

  # --- Grafana Dashboard ---

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_PATHS_PLUGINS: /opt/grafana/plugins
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/atmosphere.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      query-api:
        condition: service_healthy
    networks:
      - atmosphere-frontend
    mem_limit: 512m
    restart: unless-stopped

volumes:
  rustfs-data:
  postgres-data:
  spark-checkpoints:
  grafana-data:

networks:
  atmosphere-data:
    name: atmosphere-data
  atmosphere-frontend:
    name: atmosphere-frontend
