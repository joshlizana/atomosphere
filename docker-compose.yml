services:
  # --- Infrastructure Services ---

  seaweedfs:
    build:
      context: ./docker/seaweedfs
    container_name: seaweedfs
    ports:
      - "9000:8333"   # S3 API — host port preserved
      - "9333:9333"   # master HTTP (used by healthcheck)
    environment:
      SEAWEEDFS_ADMIN_USER: ${SEAWEEDFS_ADMIN_USER}
      SEAWEEDFS_ADMIN_PASSWORD: ${SEAWEEDFS_ADMIN_PASSWORD}
      SEAWEEDFS_READER_USER: ${SEAWEEDFS_READER_USER}
      SEAWEEDFS_READER_PASSWORD: ${SEAWEEDFS_READER_PASSWORD}
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      # Master /cluster/status is always routed; SeaweedFS S3 /healthz only
      # works on >= 4.19 and we want a probe that survives older tags too.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 15
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    container_name: polaris-bootstrap
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        java -jar /deployments/polaris-admin-tool.jar bootstrap
        --realm=${POLARIS_REALM} --credential=${POLARIS_BOOTSTRAP_CREDENTIALS}
        || echo "Bootstrap already completed (idempotent skip)"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atmosphere-data
    restart: "no"

  polaris:
    image: apache/polaris:latest
    container_name: polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      POLARIS_BOOTSTRAP_CREDENTIALS: ${POLARIS_BOOTSTRAP_CREDENTIALS}
      # AWS creds used for server-side S3 ops (manifest reads, commits).
      # Pointed at the SEAWEEDFS_ADMIN_* identity via setup.py's catalog
      # config (endpoint + endpointInternal + pathStyleAccess + stsUnavailable).
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ADMIN_USER}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_ADMIN_PASSWORD}
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
    mem_limit: 1g
    restart: unless-stopped

  # --- ClickHouse Serving Layer ---

  clickhouse:
    build:
      context: ./docker/clickhouse
    container_name: clickhouse
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD}
      SEAWEEDFS_READER_USER: ${SEAWEEDFS_READER_USER}
      SEAWEEDFS_READER_PASSWORD: ${SEAWEEDFS_READER_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      polaris:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - atmosphere-data
      - atmosphere-frontend
    mem_limit: 2g
    restart: unless-stopped

  # --- Init Container ---

  init:
    build:
      context: ./infra/init
    container_name: init
    environment:
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${SEAWEEDFS_ADMIN_USER}
      S3_SECRET_KEY: ${SEAWEEDFS_ADMIN_PASSWORD}
      POLARIS_HOST: http://polaris:8181
      POLARIS_REALM: ${POLARIS_REALM}
      POLARIS_CLIENT_ID: ${POLARIS_ROOT_USER}
      POLARIS_CLIENT_SECRET: ${POLARIS_ROOT_PASSWORD}
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_ADMIN_USER}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD}
    volumes:
      - polaris-creds:/var/polaris-creds
    depends_on:
      seaweedfs:
        condition: service_healthy
      polaris:
        condition: service_healthy
      clickhouse:
        condition: service_started
    networks:
      - atmosphere-data
    mem_limit: 512m
    restart: "no"

  # --- Spark Unified Streaming Pipeline ---

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile.sentiment
    container_name: spark
    command:
      - /bin/sh
      - -c
      - |
        exec /opt/spark/bin/spark-submit \
          --master local[*] \
          --conf spark.sql.catalog.atmosphere.credential=$$POLARIS_ROOT_USER:$$POLARIS_ROOT_PASSWORD \
          --conf spark.executorEnv.JETSTREAM_CURSOR=$$JETSTREAM_CURSOR \
          /opt/spark/work-dir/spark/unified.py
    ports:
      - "4040:4040"
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ADMIN_USER}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_ADMIN_PASSWORD}
      AWS_REGION: us-east-1
      POLARIS_ROOT_USER: ${POLARIS_ROOT_USER}
      POLARIS_ROOT_PASSWORD: ${POLARIS_ROOT_PASSWORD}
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_ADMIN_USER}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD}
      JETSTREAM_CURSOR: ${JETSTREAM_CURSOR:-}
    volumes:
      - spark-checkpoints:/opt/spark/checkpoints
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - atmosphere-data
    mem_limit: 14g
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped

  # --- Grafana Dashboard ---

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_PATHS_PLUGINS: /opt/grafana/plugins
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/atmosphere.json
      CLICKHOUSE_READER_USER: ${CLICKHOUSE_READER_USER}
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - atmosphere-frontend
    mem_limit: 512m
    restart: unless-stopped

volumes:
  seaweedfs-data:
  postgres-data:
  spark-checkpoints:
  grafana-data:
  clickhouse-data:
  polaris-creds:

networks:
  atmosphere-data:
    name: atmosphere-data
  atmosphere-frontend:
    name: atmosphere-frontend
